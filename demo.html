<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Demo Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Song Chord Viewer and Setlist Manager</h1>
    </header>
    <main>
        <section id="chord-viewer">
            <h2>Chord Viewer</h2>
            <input type="text" id="song-input" placeholder="Enter song title...">
            <button id="view-chords">View Chords</button>
            <div id="chords-display"></div>
        </section>
        
        <section id="setlist-manager">
            <h2>Setlist Manager</h2>
            <input type="text" id="setlist-input" placeholder="Add song to setlist...">
            <button id="add-to-setlist">Add to Setlist</button>
            <ul id="setlist"></ul>
        </section>
        
        <section id="song-library">
            <h2>Song Library</h2>
            <input type="text" id="search-bar" placeholder="Search songs...">
            <ul id="song-list"></ul>
        </section>
    </main>
    <footer>
        <p>© 2026 Music ABCF</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
