<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music-ABCF</title>
    <!-- Polyfill missing Performance API methods (fixes "mgt.clearMarks is not a function") -->
    <script>
      (function() {
        var p = window.performance || (window.performance = {});
        if (!p.clearMarks)  p.clearMarks  = function() {};
        if (!p.clearMeasures) p.clearMeasures = function() {};
        if (!p.mark)        p.mark        = function() {};
        if (!p.measure)     p.measure     = function() {};
      })();
    </script>
    <!-- Better monospace font for chords -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== Base layout: fill viewport exactly ===== */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== Fix flex chain for all React-Native-Web containers ===== */
        /* React Native Web wraps everything in divs with display:flex.
           For scrolling to work, every ancestor of the ScrollView must
           have min-height:0 so the flex child can shrink below its content. */
        #root > div,
        #root > div > div {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* ===== Lyrics scroll area ===== */
        [data-testid="lyrics-scroll"] {
            flex: 1 !important;
            min-height: 0 !important;
            overflow-y: scroll !important;
            -webkit-overflow-scrolling: touch;
        }
        /* The inner content wrapper rendered by ScrollView */
        [data-testid="lyrics-scroll"] > div {
            flex-shrink: 0;
        }

        /* ===== Custom scrollbar ===== */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1A1A;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #4FC3F7;
            border-radius: 5px;
            border: 2px solid #1A1A1A;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: #81D4FA;
        }
        /* Firefox scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: #4FC3F7 #1A1A1A;
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
