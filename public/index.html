<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music-ABCF</title>
    <style>
        html, body, #root {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #root {
            display: flex;
            flex-direction: column;
        }
        /* Enable scrollbar visibility in scrollable areas */
        [data-testid="lyrics-scroll"] > div,
        [role="scrollbar"],
        .r-overflow-scroll > div {
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1A1A;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #4FC3F7;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: #81D4FA;
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
